services:
  db:
    image: postgres:17-alpine
    container_name: deyno_db_dev
    environment:
      POSTGRES_DB: deyno
      POSTGRES_USER: deyno
      POSTGRES_PASSWORD: deyno
    ports:
      - '5436:5432'
    volumes:
      - deyno-pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U deyno -d deyno']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  deyno-pgdata-dev:
